# Mechanistic KYC -- experiment config.
# The threshold blocks below ARE the pre-registered success criteria.
# Agree on them as a team BEFORE seeing results.

seed: 42

model:
  primary: google/gemma-2-9b-it
  replication: meta-llama/Llama-3.1-8B-Instruct
  dtype: bfloat16            # never quantize for interp -- breaks activation stats

sae:
  gemma_scope: google/gemma-scope-9b-it-res
  llama_scope: fnlp/Llama-Scope

data:
  n_profiles: 6000
  split_by: profile_id       # prevents train/test leakage
  tiers: [conservative, moderate, aggressive]

# ---- Risk-tolerance rubric (Phase 0, finalized 2026-06-14) ----
# field -> a_i in [0,1] (0 = supports lower risk, 1 = supports higher risk):
#   levels:  evenly-spaced Likert points over the list, in order
#   range:   linear min-max over [lo, hi]; invert: true flips (hi-x)/(hi-lo)
# score = 100 * sum(weight_i * a_i); weights must sum to 1.0
rubric:
  fields:
    past_drawdown_reaction:
      weight: 0.30
      levels: [sold_everything, reduced, held, bought_more]
    horizon_years:
      weight: 0.25
      range: [1, 35]
    investing_experience:
      weight: 0.12
      levels: [none, some, extensive]
    income_stability:
      weight: 0.10
      levels: [precarious, variable, stable]
    stated_goal:
      weight: 0.08
      levels: [capital_preservation, income, balanced_growth, maximum_growth]
    emergency_fund_months:
      weight: 0.08
      range: [0, 24]
    dependents:
      weight: 0.04
      range: [0, 4]
      invert: true
    age:
      weight: 0.03
      range: [23, 75]
      invert: true
  tier_cutoffs:
    conservative_max: 40   # s < 40 -> conservative
    moderate_max: 70       # 40 <= s <= 70 -> moderate; s > 70 -> aggressive

extraction:
  layers: [20, 25, 31]       # TBD -- sweep mid-to-late residual stream
  positions: [profile_end, decision]   # probe both; localization is a finding

advice_tasks: [portfolio_choice, equity_allocation, margin_approval]

# ---- S2 vignette rendering ----
# Vignettes store the CLIENT NARRATIVE ONLY. The advice-task options (A-D/E) are
# composed at inference (S3) with option-order permutation, so they live here as a
# forward reference for S3 -- S2 does not consume `advice_options`.
vignette:
  n_pairs: 1200
  pair_render_tier: implicit   # render counterfactual pairs in this tier
  paraphrase:
    backend: openai            # openai | gemini
    model: gpt-4o-mini         # or gemini-1.5-flash
    temperature: 0.7
    max_retries: 4
    max_workers: 8             # thread pool for API throughput
  # Banned in IMPLICIT tier only; regex is word-boundary + stem (risk -> risky, riskier).
  # 'moderate' deliberately excluded: over-filters normal English ("a moderate income").
  banned_lexicon: [risk, conservative, aggressive, volatile, volatility, tolerance,
                   cautious, caution, safe, safety, secure, gamble, speculative,
                   speculation, bold, daring, timid, wary, prudent, reckless]
  qc:
    tier_balance_tol: 0.02     # tier shares within +/- 2%
    token_len_tol: 0.10        # mean token length matched across tiers/types +/- 10%
    dup_fraction_max: 0.005    # MinHash near-dup fraction < 0.5%
    roundtrip_sample: 50       # implicit vignettes sampled for tier-recovery check

# Forward reference for S3 (NOT used by S2): the user's 4-option allocation task.
advice_options:
  portfolio_choice:
    - "80% bonds, 20% stocks"
    - "60% bonds, 40% stocks"
    - "30% bonds, 70% stocks"
    - "10% bonds, 90% stocks"
  equity_fractions: [0.20, 0.40, 0.70, 0.90]   # score anchors for the weighted average

# ---- Pre-registered thresholds ----

gate:                        # Phase 1 (go/no-go)
  spearman_rho_min: 0.50
  hedge_rate_max: 0.20

probe:                       # RQ1
  auroc_min: 0.85            # on implicit held-out
  baseline_margin_min: 0.07  # over TF-IDF
  ridge_r2_min: 0.50

patching:                    # RQ2a
  flip_rate_min: 0.70        # both directions

steering:                    # RQ2b
  dose_spearman_min: 0.80    # on >= 2/3 tasks, flat random-direction control
  side_effects:
    mmlu_delta_max: 2.0
    ppl_ratio_max: 1.05
    refusal_delta_max: 0.05

self_vs_client:              # RQ2c (novelty)
  cosine_distinct_max: 0.50   # distinct directions
  cosine_conflation_min: 0.80 # OR this -> "conflation" finding

pressure:                    # RQ3
  classifiable_min: 0.60

monitor:                     # deliverable
  auroc_vs_judge_margin_min: -0.03

paths:
  data_dir: data
  results_dir: results
  cache_dir: cache
  vignettes_dir: data/vignettes
